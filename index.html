<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vera — Quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="startScreen" class="screen">
      <div class="brand">
        <span class="brand-icon">V</span>
        <h1>Vera Quiz</h1>
        <p class="brand-sub">Answer anonymously. Results revealed live.</p>
      </div>
      <button id="startQuizBtn" class="btn btn-start">Start Quiz</button>
    </div>

    <div id="quizScreen" class="screen hidden">
      <header class="quiz-header">
        <span id="questionNum" class="q-num">Question 1 of 8</span>
        <span id="timerDisplay" class="timer">05:00</span>
      </header>
      <div class="question-area">
        <p id="questionText" class="question-text">Loading...</p>
      </div>
      <div id="optionsContainer" class="options-container"></div>
      <div class="quiz-footer">
        <span id="progressDots" class="progress-dots"></span>
        <button id="nextBtn" class="btn btn-next">Next</button>
        <button id="submitBtn" class="btn btn-submit hidden">Submit Anonymously</button>
      </div>
    </div>

    <div id="confirmScreen" class="screen hidden">
      <div class="brand">
        <span class="brand-icon">V</span>
        <h2>Submit Your Answers?</h2>
        <p class="brand-sub">Your identity will not be recorded.</p>
      </div>
      <div class="confirm-actions">
        <button id="confirmSubmitBtn" class="btn btn-submit">Yes, Submit Anonymously</button>
        <button id="cancelSubmitBtn" class="btn btn-cancel">Go Back</button>
      </div>
    </div>

    <div id="thanksScreen" class="screen hidden">
      <div class="brand">
        <span class="brand-icon">V</span>
        <h2>Submitted!</h2>
        <p class="brand-sub">Your answers have been recorded anonymously.</p>
        <p class="brand-sub">You may now close this page.</p>
      </div>
      <div class="checkmark">&#10003;</div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
