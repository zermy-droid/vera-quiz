<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera Quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="logo-sm">V</span>
    <span class="brand">Vera</span>
  </header>

  <main class="container">
    <section id="startScreen" class="card center">
      <h2>Ready to start?</h2>
      <p>You have 5 minutes to answer all questions.</p>
      <button id="startBtn" class="btn primary lg">Start Quiz</button>
    </section>

    <section id="quizScreen" class="card hidden">
      <div class="quiz-top">
        <span id="qNum" class="qnum"></span>
        <span id="timer" class="timer"></span>
      </div>
      <p id="qText" class="qtext"></p>
      <div id="opts" class="opts"></div>
      <div id="dots" class="dots"></div>
      <div class="quiz-bottom">
        <button id="nextBtn" class="btn primary">Next</button>
        <button id="submitBtn" class="btn accent hidden">Submit</button>
      </div>
    </section>

    <section id="doneScreen" class="card center hidden">
      <h2>Submitted!</h2>
      <p>Your answers have been recorded. Thank you!</p>
    </section>

    <section id="errorScreen" class="card center hidden">
      <h2>Invalid quiz link</h2>
      <p>Ask your teacher for a new QR code.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
